<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaziBot · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Core ─────────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #06060f;
      --surface: #0c0c1d;
      --card: #111126;
      --card2: #161630;
      --border: rgba(255, 255, 255, .07);
      --border2: rgba(255, 255, 255, .12);
      --violet: #7c3aed;
      --violet2: #a78bfa;
      --violet3: #c4b5fd;
      --green: #22c55e;
      --red: #f43f5e;
      --amber: #f59e0b;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --text: #f1f0ff;
      --muted: #6b6b9a;
      --muted2: #4a4a72;
      --glow: rgba(124, 58, 237, .35);
      --r: 16px;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
    }

    /* Noise texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--muted2);
      border-radius: 2px;
    }

    /* ── Animated bg orbs ─────────────────────────────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .12;
      pointer-events: none;
      animation: drift 20s ease-in-out infinite;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: var(--violet);
      top: -200px;
      left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: var(--pink);
      bottom: -150px;
      right: -100px;
      animation-delay: -7s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: var(--cyan);
      top: 50%;
      left: 40%;
      animation-delay: -14s;
    }

    @keyframes drift {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(30px, -20px) scale(1.05);
      }

      66% {
        transform: translate(-20px, 15px) scale(.95);
      }
    }

    /* ── Login ────────────────────────────────────────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: var(--bg);
    }

    .login-card {
      background: rgba(17, 17, 38, .8);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border2);
      border-radius: 24px;
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 0 80px rgba(124, 58, 237, .15), 0 32px 64px rgba(0, 0, 0, .5);
      max-width: 420px;
      width: 90%;
      animation: slideUp .6s cubic-bezier(.16, 1, .3, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--violet), var(--pink));
      display: grid;
      place-items: center;
      font-size: 36px;
      box-shadow: 0 8px 32px var(--glow);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) rotate(0deg);
      }

      50% {
        transform: translateY(-8px) rotate(2deg);
      }
    }

    .login-card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.5px;
      background: linear-gradient(to right, var(--violet3), var(--text));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-card p {
      color: var(--muted);
      font-size: .9rem;
      text-align: center;
    }

    .btn-login {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--violet);
      color: #fff;
      padding: 13px 28px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: .95rem;
      transition: all .2s;
      border: 1px solid rgba(255, 255, 255, .1);
      box-shadow: 0 4px 24px var(--glow);
      position: relative;
      overflow: hidden;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, .1), transparent);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--glow);
      filter: brightness(1.1);
    }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    #sidebar {
      width: 68px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 10px;
      position: fixed;
      inset-block: 0;
      left: 0;
      z-index: 50;
      transition: width .3s cubic-bezier(.16, 1, .3, 1);
      overflow: hidden;
    }

    #sidebar:hover {
      width: 220px;
    }

    .sidebar-brand {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--violet), var(--pink));
      display: grid;
      place-items: center;
      font-size: 22px;
      box-shadow: 0 4px 16px var(--glow);
      margin-bottom: 8px;
      transition: border-radius .2s;
    }

    #sidebar:hover .sidebar-brand {
      border-radius: 50%;
    }

    .sidebar-sep {
      width: 32px;
      height: 1px;
      background: var(--border2);
      margin: 4px 0;
      flex-shrink: 0;
      transition: width .3s;
    }

    #sidebar:hover .sidebar-sep {
      width: 180px;
    }

    .guild-row {
      width: 100%;
      display: flex;
      align-items: center;
      padding: 0 2px;
      gap: 12px;
      flex-shrink: 0;
    }

    .guild-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--card2);
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
      position: relative;
      transition: border-radius .2s, transform .15s, box-shadow .15s;
    }

    .guild-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .guild-btn .initials {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
    }

    .guild-btn:hover {
      border-radius: 10px;
      transform: scale(1.06);
    }

    .guild-btn.active {
      border-radius: 10px;
      box-shadow: 0 0 0 2px var(--violet), 0 4px 16px var(--glow);
    }

    .guild-name-label {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      color: var(--text);
      opacity: 0;
      transition: opacity .2s .05s;
      pointer-events: none;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #sidebar:hover .guild-name-label {
      opacity: 1;
    }

    /* ── Main layout ──────────────────────────────────────────────────────── */
    #main {
      margin-left: 68px;
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #topbar {
      height: 56px;
      flex-shrink: 0;
      background: rgba(12, 12, 29, .85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: relative;
      z-index: 10;
    }

    .topbar-title {
      font-size: .95rem;
      font-weight: 600;
      flex: 1;
    }

    .topbar-title span {
      color: var(--muted);
      font-weight: 400;
      font-size: .8rem;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px 4px 4px;
      font-size: 13px;
      font-weight: 500;
    }

    .user-chip img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
    }

    .btn-logout {
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      transition: all .15s;
    }

    .btn-logout:hover {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* ── Content area ─────────────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── Empty state ──────────────────────────────────────────────────────── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .empty-icon {
      font-size: 52px;
      opacity: .3;
      animation: float 4s ease-in-out infinite;
    }

    /* ── Now Playing ──────────────────────────────────────────────────────── */
    #now-playing {
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      min-height: 140px;
      animation: fadeSlide .4s cubic-bezier(.16, 1, .3, 1);
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #np-bg {
      position: absolute;
      inset: -10px;
      background-size: cover;
      background-position: center;
      filter: blur(48px) brightness(.25) saturate(1.8);
      transform: scale(1.1);
    }

    #np-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(6, 6, 15, .9) 30%, rgba(6, 6, 15, .5));
    }

    .np-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px 28px;
    }

    #np-thumb {
      width: 88px;
      height: 88px;
      border-radius: 12px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
      transition: transform .3s;
    }

    #np-thumb:hover {
      transform: scale(1.04) rotate(1deg);
    }

    .np-text {
      flex: 1;
      min-width: 0;
    }

    .np-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(34, 197, 94, .12);
      border: 1px solid rgba(34, 197, 94, .2);
      border-radius: 999px;
      padding: 3px 10px 3px 6px;
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: .3px;
      margin-bottom: 8px;
    }

    .eq-bars {
      display: flex;
      gap: 2px;
      align-items: flex-end;
      height: 14px;
    }

    .eq-bar {
      width: 3px;
      background: var(--green);
      border-radius: 2px;
      animation: eq 1s ease-in-out infinite;
    }

    .eq-bar:nth-child(1) {
      animation-delay: 0s;
    }

    .eq-bar:nth-child(2) {
      animation-delay: .15s;
    }

    .eq-bar:nth-child(3) {
      animation-delay: .3s;
    }

    @keyframes eq {

      0%,
      100% {
        height: 4px;
      }

      50% {
        height: 14px;
      }
    }

    .paused-icon {
      color: var(--amber);
      font-size: 12px;
    }

    #np-title {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -.3px;
      color: var(--text);
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color .15s;
      margin-bottom: 4px;
    }

    #np-title:hover {
      color: var(--violet3);
    }

    #np-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .np-right {
      flex-shrink: 0;
      text-align: right;
    }

    #np-duration {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted2);
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
    }

    /* ── Controls row ─────────────────────────────────────────────────────── */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .ctrl {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .18s cubic-bezier(.16, 1, .3, 1);
      position: relative;
      overflow: hidden;
    }

    .ctrl::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(255, 255, 255, .06), transparent);
      opacity: 0;
      transition: opacity .15s;
    }

    .ctrl:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, .3);
    }

    .ctrl:hover::before {
      opacity: 1;
    }

    .ctrl:active {
      transform: scale(.97);
    }

    .ctrl.green {
      background: rgba(34, 197, 94, .15);
      border-color: rgba(34, 197, 94, .25);
      color: var(--green);
    }

    .ctrl.red {
      background: rgba(244, 63, 94, .15);
      border-color: rgba(244, 63, 94, .25);
      color: var(--red);
    }

    .ctrl.amber {
      background: rgba(245, 158, 11, .15);
      border-color: rgba(245, 158, 11, .25);
      color: var(--amber);
    }

    .ctrl.active {
      background: rgba(124, 58, 237, .2);
      border-color: rgba(124, 58, 237, .4);
      color: var(--violet2);
      box-shadow: 0 0 16px var(--glow);
    }

    .ctrl svg {
      width: 15px;
      height: 15px;
    }

    /* ── Volume ───────────────────────────────────────────────────────────── */
    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px;
      flex: 1;
      min-width: 180px;
      max-width: 280px;
    }

    .vol-icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: var(--border2);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      background-image: linear-gradient(var(--violet2), var(--violet2));
      background-repeat: no-repeat;
    }

    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--violet2);
      box-shadow: 0 0 8px var(--glow);
      cursor: pointer;
      transition: transform .15s;
    }

    #volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    #vol-pct {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 30px;
      text-align: right;
    }

    /* ── Section header ───────────────────────────────────────────────────── */
    .sec-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sec-badge {
      background: var(--violet);
      color: #fff;
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 999px;
      letter-spacing: 0;
    }

    /* ── Queue ────────────────────────────────────────────────────────────── */
    #queue-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      flex: 1;
    }

    .queue-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    #queue-list {
      overflow-y: auto;
      max-height: 320px;
    }

    .q-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      cursor: default;
      animation: fadeSlide .25s ease both;
    }

    .q-item:last-child {
      border-bottom: none;
    }

    .q-item:hover {
      background: rgba(255, 255, 255, .03);
    }

    .q-num {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted2);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .q-thumb {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--card2);
    }

    .q-info {
      flex: 1;
      min-width: 0;
    }

    .q-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color .12s;
    }

    .q-title:hover {
      color: var(--violet3);
    }

    .q-duration {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted2);
      margin-top: 2px;
    }

    .q-del {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: transparent;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      font-size: 13px;
      display: grid;
      place-items: center;
      transition: all .12s;
      flex-shrink: 0;
    }

    .q-del:hover {
      background: rgba(244, 63, 94, .15);
      color: var(--red);
    }

    .q-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted2);
      font-size: 14px;
      font-style: italic;
    }

    /* ── Status dot ───────────────────────────────────────────────────────── */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .dot.playing {
      background: var(--green);
      animation: blink 1.4s ease-in-out infinite;
      box-shadow: 0 0 6px var(--green);
    }

    .dot.paused {
      background: var(--amber);
    }

    .dot.idle {
      background: var(--muted2);
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    /* ── Search bar ────────────────────────────────────────────────────── */
    .search-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      transition: border-color .2s;
    }

    .search-card:focus-within {
      border-color: var(--violet);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .search-icon {
      font-size: 16px;
      flex-shrink: 0;
      color: var(--muted);
    }

    #search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: var(--text);
    }

    #search-input::placeholder {
      color: var(--muted2);
    }

    #search-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 9px;
      background: var(--violet);
      border: none;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all .18s;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    #search-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    #search-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }

    #search-btn .spin {
      display: none;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Toast ─────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      z-index: 200;
      pointer-events: none;
      transition: transform .3s cubic-bezier(.16, 1, .3, 1), opacity .3s;
      opacity: 0;
      white-space: nowrap;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.ok {
      border-color: rgba(34, 197, 94, .3);
      color: var(--green);
    }

    #toast.err {
      border-color: rgba(244, 63, 94, .3);
      color: var(--red);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ── Login ──────────────────────────────────────────────────────────── -->
  <div id="login-screen" class="hidden">
    <div class="login-card">
      <div class="login-logo">🎵</div>
      <h1>MaziBot</h1>
      <p>Controlla la musica del tuo server direttamente dal browser.</p>
      <a href="/auth/login" class="btn-login">
        <svg width="18" height="18" viewBox="0 0 71 55" fill="currentColor">
          <path
            d="M60.1 4.9A58.5 58.5 0 0 0 45.4.7a40.7 40.7 0 0 0-1.8 3.7 54.2 54.2 0 0 0-16.2 0A40.7 40.7 0 0 0 25.6.7 58.4 58.4 0 0 0 10.9 4.9C1.6 18.9-1 32.5.3 46a58.8 58.8 0 0 0 17.9 9.1 44.2 44.2 0 0 0 3.8-6.2 38.3 38.3 0 0 1-6-2.9l1.5-1.1a41.9 41.9 0 0 0 35.9 0l1.5 1.1a38.4 38.4 0 0 1-6 2.9 44.2 44.2 0 0 0 3.8 6.2A58.7 58.7 0 0 0 70.7 46C72.3 30.3 68 16.8 60.1 4.9ZM23.7 37.5c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.3 7.2 0 4-2.8 7.2-6.3 7.2Zm23.6 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.3 7.2 0 4-2.8 7.2-6.3 7.2Z" />
        </svg>
        Accedi con Discord
      </a>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- ── App shell ───────────────────────────────────────────────────────── -->
  <div id="app" class="hidden" style="display:flex;width:100%;height:100vh;">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-brand">🎵</div>
      <div class="sidebar-sep"></div>
      <div id="guild-list"
        style="display:flex;flex-direction:column;gap:6px;width:100%;align-items:flex-start;overflow-y:auto;flex:1;">
      </div>
    </nav>

    <div id="main">
      <!-- Topbar -->
      <header id="topbar">
        <div class="topbar-title" id="topbar-guild">
          <span>Seleziona un server</span>
        </div>
        <div class="user-chip">
          <img id="user-avatar" src="" alt="" />
          <span id="user-name"></span>
        </div>
        <button class="btn-logout" onclick="location.href='/auth/logout'">Esci</button>
      </header>

      <!-- Content -->
      <div id="content">
        <div id="empty-state">
          <div class="empty-icon">🎧</div>
          <p style="color:var(--muted);font-size:.9rem;">Seleziona un server dalla barra laterale</p>
        </div>

        <div id="player-section" class="hidden" style="display:flex;flex-direction:column;gap:18px;">

          <!-- Now Playing -->
          <div id="now-playing">
            <div id="np-bg"></div>
            <div class="np-inner">
              <img id="np-thumb" src="" alt="" />
              <div class="np-text">
                <div class="np-chip">
                  <div class="eq-bars" id="eq-bars">
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                    <div class="eq-bar"></div>
                  </div>
                  <span id="np-status-text">In riproduzione</span>
                </div>
                <a id="np-title" href="#" target="_blank">—</a>
                <div id="np-meta" class="np-meta"></div>
              </div>
              <div class="np-right">
                <div id="np-duration"></div>
              </div>
            </div>
          </div>

          <!-- Controls -->
          <div id="controls">
            <button class="ctrl green" id="btn-playpause" onclick="ctrlPause()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
              Pausa
            </button>
            <button class="ctrl amber" onclick="ctrlSkip()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
              </svg>
              Skip
            </button>
            <button class="ctrl red" onclick="ctrlStop()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h12v12H6z" />
              </svg>
              Stop
            </button>
            <button class="ctrl" id="btn-loop" onclick="ctrlLoop()">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z" />
              </svg>
              Loop
            </button>
            <div class="vol-wrap">
              <span class="vol-icon">🔊</span>
              <input type="range" id="volume-slider" min="0" max="100" value="50" oninput="updateVolUI(this.value)"
                onchange="ctrlVolume(this.value)" />
              <span id="vol-pct">50%</span>
            </div>
          </div>

          <!-- Search bar -->
          <div class="search-card">
            <span class="search-icon">🔍</span>
            <input id="search-input" type="text" placeholder="Cerca un brano su YouTube o incolla un URL..."
              onkeydown="if(event.key==='Enter') addSong()" />
            <button id="search-btn" onclick="addSong()">
              <div class="spin" id="search-spin"></div>
              <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
                <path
                  d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z" />
              </svg>
              Aggiungi
            </button>
          </div>

          <!-- Queue -->
          <div id="queue-card">
            <div class="queue-hdr">
              <div class="dot idle" id="status-dot"></div>
              <div class="sec-header"
                style="text-transform:none;font-size:.85rem;font-weight:600;letter-spacing:0;color:var(--text);">
                Coda di riproduzione
              </div>
              <span class="sec-badge" id="queue-badge">0</span>
            </div>
            <div id="queue-list"></div>
          </div>

        </div><!-- /player-section -->
      </div><!-- /content -->
    </div><!-- /main -->
  </div><!-- /app -->

  <script>
    let activeGuildId = null, pollTimer = null, volDebounce = null;

    // ── Init ─────────────────────────────────────────────────────────────────
    async function init() {
      const res = await fetch('/api/me').catch(() => null);
      if (!res || res.status === 401) {
        document.getElementById('login-screen').classList.remove('hidden');
        return;
      }
      const data = await res.json();

      // Avatar utente
      document.getElementById('user-avatar').src = data.user.avatar
        || `https://cdn.discordapp.com/embed/avatars/0.png`;
      document.getElementById('user-name').textContent = data.user.username;

      // Popola sidebar guild
      const list = document.getElementById('guild-list');
      list.innerHTML = '';
      data.guilds.forEach((g, i) => {
        const row = document.createElement('div');
        row.className = 'guild-row';
        row.innerHTML = `
      <button class="guild-btn" id="gb-${g.id}"
        onclick="selectGuild('${g.id}','${esc(g.name)}')"
        title="${esc(g.name)}"
        style="animation:fadeSlide .3s ${i * 60}ms ease both">
        ${g.icon
            ? `<img src="${g.icon}" alt="${esc(g.name)}"
               onerror="this.parentNode.innerHTML='<span class=\\'initials\\'>${initials(g.name)}</span>'" />`
            : `<span class="initials">${initials(g.name)}</span>`}
      </button>
      <span class="guild-name-label">${esc(g.name)}</span>`;
        list.appendChild(row);
      });

      document.getElementById('app').classList.remove('hidden');
      document.getElementById('app').style.display = 'flex';

      if (data.guilds.length > 0) selectGuild(data.guilds[0].id, data.guilds[0].name);
    }

    // ── Select guild ──────────────────────────────────────────────────────────
    function selectGuild(id, name) {
      activeGuildId = id;
      document.getElementById('topbar-guild').innerHTML = name;
      document.querySelectorAll('.guild-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`gb-${id}`)?.classList.add('active');
      document.getElementById('empty-state').classList.add('hidden');
      const ps = document.getElementById('player-section');
      ps.classList.remove('hidden');
      ps.style.display = 'flex';
      clearInterval(pollTimer);
      pollState();
      pollTimer = setInterval(pollState, 3000);
    }

    // ── Poll ──────────────────────────────────────────────────────────────────
    async function pollState() {
      if (!activeGuildId) return;
      const res = await fetch(`/api/guild/${activeGuildId}/state`).catch(() => null);
      if (res?.ok) renderState(await res.json());
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderState(s) {
      const np = s.current;
      const dot = document.getElementById('status-dot');
      const eq = document.getElementById('eq-bars');

      if (np) {
        document.getElementById('np-thumb').src = np.thumbnail || '';
        document.getElementById('np-bg').style.backgroundImage = np.thumbnail ? `url(${np.thumbnail})` : 'none';
        document.getElementById('np-title').textContent = np.title;
        document.getElementById('np-title').href = np.webpage_url || '#';
        document.getElementById('np-duration').innerHTML =
          `<div id="np-duration" class="np-right"><div style="font-family:'Space Mono',monospace;font-size:13px;color:var(--muted2);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:4px 10px">${np.duration}</div></div>`;
        document.getElementById('np-meta').textContent = np.requester ? `Richiesto da ${np.requester}` : '';

        if (s.paused) {
          document.getElementById('np-status-text').textContent = 'In pausa';
          eq.style.display = 'none';
          eq.previousElementSibling && null;
          dot.className = 'dot paused';
        } else {
          document.getElementById('np-status-text').textContent = 'In riproduzione';
          eq.style.display = 'flex';
          dot.className = 'dot playing';
        }
      } else {
        document.getElementById('np-title').textContent = '— Niente in riproduzione —';
        document.getElementById('np-thumb').src = '';
        document.getElementById('np-bg').style.backgroundImage = 'none';
        document.getElementById('np-meta').textContent = '';
        eq.style.display = 'none';
        dot.className = 'dot idle';
      }

      // Pulsante play/pause
      const pp = document.getElementById('btn-playpause');
      if (s.paused) {
        pp.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M8 5v14l11-7z"/></svg> Riprendi`;
        pp.onclick = ctrlResume;
      } else {
        pp.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg> Pausa`;
        pp.onclick = ctrlPause;
      }

      // Loop
      document.getElementById('btn-loop').className = 'ctrl' + (s.loop ? ' active' : '');

      // Volume
      const sl = document.getElementById('volume-slider');
      if (!sl.matches(':active')) {
        sl.value = s.volume;
        updateVolUI(s.volume);
      }

      // Queue
      document.getElementById('queue-badge').textContent = s.queue.length;
      const ql = document.getElementById('queue-list');
      if (!s.queue.length) {
        ql.innerHTML = '<div class="q-empty">La coda è vuota ✨</div>';
      } else {
        ql.innerHTML = s.queue.map((song, i) => `
      <div class="q-item" style="animation-delay:${i * 30}ms">
        <span class="q-num">${i + 1}</span>
        <img class="q-thumb" src="${song.thumbnail || ''}" alt=""
             onerror="this.style.visibility='hidden'" />
        <div class="q-info">
          <a class="q-title" href="${song.webpage_url || '#'}" target="_blank" title="${esc(song.title)}">${esc(song.title)}</a>
          <div class="q-duration">${song.duration}</div>
        </div>
        <button class="q-del" onclick="ctrlRemove(${i})" title="Rimuovi">✕</button>
      </div>`).join('');
      }
    }

    // ── Volume UI ─────────────────────────────────────────────────────────────
    function updateVolUI(v) {
      const pct = parseInt(v);
      document.getElementById('vol-pct').textContent = pct + '%';
      const sl = document.getElementById('volume-slider');
      sl.style.backgroundSize = `${pct}% 100%`;
    }

    // ── Commands ──────────────────────────────────────────────────────────────
    async function ctrlPause() { await api('POST', 'pause'); }
    async function ctrlResume() { await api('POST', 'resume'); }
    async function ctrlSkip() { await api('POST', 'skip'); }
    async function ctrlStop() { await api('POST', 'stop'); }
    async function ctrlLoop() { await api('POST', 'loop'); }
    async function ctrlRemove(i) { await api('DELETE', `queue/${i}`); }

    function ctrlVolume(v) {
      clearTimeout(volDebounce);
      volDebounce = setTimeout(() => api('POST', 'volume', { volume: +v }), 350);
    }

    async function api(method, path, body) {
      if (!activeGuildId) return;
      const r = await fetch(`/api/guild/${activeGuildId}/${path}`, {
        method, headers: { 'Content-Type': 'application/json' },
        ...(body ? { body: JSON.stringify(body) } : {})
      }).catch(() => null);
      if (r?.ok) await pollState();
    }

    // ── Utils ─────────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function initials(n) {
      return String(n).split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase() || '?';
    }

    async function addSong() {
      const input = document.getElementById('search-input');
      const btn = document.getElementById('search-btn');
      const spin = document.getElementById('search-spin');
      const query = input.value.trim();
      if (!query || !activeGuildId) return;
      btn.disabled = true;
      spin.style.display = 'block';
      const r = await fetch(`/api/guild/${activeGuildId}/play`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      }).catch(() => null);
      btn.disabled = false;
      spin.style.display = 'none';
      if (r?.ok) {
        const data = await r.json();
        showToast(data.action === 'queued'
          ? `✅ Aggiunto in coda: ${data.title}`
          : `▶ In riproduzione: ${data.title}`, 'ok');
        input.value = '';
        await pollState();
      } else {
        const err = r ? (await r.json().catch(() => ({ detail: 'Errore' }))).detail : 'Errore di rete';
        showToast(`❌ ${err}`, 'err');
      }
    }

    let _toastT;
    function showToast(msg, type = 'ok') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      clearTimeout(_toastT);
      _toastT = setTimeout(() => t.className = type, 3500);
    }

    init();
  </script>
</body>

</html>
